name: Check upstream release

on:
  schedule:
    - cron: '0 0 * * *'  # Check every day at midnight UTC
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      packages: read
    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/calibrain/shelfmark/releases/latest \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.tag_name')
          echo "tag=$RELEASE" >> $GITHUB_OUTPUT

      - name: Check if image already exists in registry
        id: image_check
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Exchange GitHub token for a ghcr.io pull token, then probe the manifest.
          GHCR_TOKEN=$(curl -s \
            -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/token?scope=repository:${REPO}:pull" \
            | jq -r '.token')

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            "https://ghcr.io/v2/${REPO}/manifests/${TAG}")

          if [ "$STATUS" = "200" ]; then
            echo "Image ghcr.io/${REPO}:${TAG} already exists — skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image ghcr.io/${REPO}:${TAG} not found (HTTP ${STATUS}) — will trigger build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger build if new release
        if: steps.image_check.outputs.exists != 'true'
        run: |
          echo "New release detected: ${{ steps.upstream.outputs.tag }}"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
            -d '{"ref":"main","inputs":{"upstream_tag":"${{ steps.upstream.outputs.tag }}"}}'
